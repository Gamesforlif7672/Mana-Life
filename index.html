<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mana Life</title>
    <style>html, body {
  font-family: system-ui, sans-serif;
  background: #0e0e10;
  color: white;
  margin: 0;
  padding: 1rem;
}

a {
  text-decoration: none;
  color: #ddd;
}

#begin {
  display: block;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #444;
  padding: 1rem 1.25rem;
  border: 3px solid #666;
  border-radius: 6px;
  cursor: pointer;
}

#begin:hover {
  filter: brightness(110%);
}

#gameArea {
  display: none;
}

#tabBar {
  margin-bottom: 10px;
}

.tab {
  background: rgb(95, 92, 92);
  width: 95px;
  height: 40px;
  color: white;
  border: 3px solid rgb(70, 70, 70);
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  filter: brightness(115%);
}

.collect {
  background-color: rgb(34, 139, 34);
  border: 3px solid rgb(24, 100, 24);
  border-radius: 6px;
  margin: 5px;
  padding: 8px 12px;
  color: white;
  cursor: pointer;
}

.craft {
  background-color: rgb(200, 100, 0);
  border: 3px solid rgb(160, 80, 0);
  border-radius: 6px;
  margin: 5px;
  padding: 8px 12px;
  color: white;
  cursor: pointer;
}

.explore {
  background-color: rgb(70, 130, 180);
  border: 3px solid rgb(50, 100, 150);
  border-radius: 6px;
  margin: 5px;
  padding: 8px 12px;
  color: white;
  cursor: pointer;
}

/* Default hidden sections/buttons */
#craftingTab,
#crafting,
#craftingT2,
#inventory,
#explore,
#cave,
#hunting,
#makeT1Crafting,
#fillBucket,
#mineDirt,
#mineStoneMetal,
#rawMetalBtn,
#huntBtn {
  display: none;
}

/* Dynamic: cave and hunting tabs hidden until unlocked */
#caveTab,
#huntingTab {
  display: none;
}

#inventoryDisplay {
  font-size: 16px;
  line-height: 1.4;
}</style>
  </head>
  <body>
    <a id="begin" onclick="beginGame()">Begin</a>

    <div id="gameArea">
      <div id="tabBar">
        <table>
          <tr>
            <td><button id="forestTab" class="tab" onclick="tabSwitch('forest')">Forest</button></td>
            <td><button id="exploreTab" class="tab" onclick="tabSwitch('explore')">River</button></td>
            <td><button id="inventoryTab" class="tab" onclick="tabSwitch('inventory')">Inventory</button></td>
            <td><button id="caveTab" class="tab" onclick="tabSwitch('cave')">Cave</button></td>
            <td><button id="craftingTab" class="tab" onclick="tabSwitch('crafting')">Crafting</button></td>
            <td><button id="huntingTab" class="tab" onclick="tabSwitch('hunting')">Hunting</button></td>
          </tr>
        </table>
      </div>

      <div id="forest">
        <p>You wake up in a forest.</p>
        <button id="search" class="explore" onclick="discoverCave()">Look around</button><br>
        <button id="stickBtn" class="collect" onclick="collectStick()">Collect Sticks</button><br>
        <button id="stoneBtn" class="collect" onclick="collectStone()">Collect Stones</button><br>
      </div>

      <div id="explore">
        <p>River</p>
        <button id="fillBucket" class="collect" onclick="fillBucket()">Fill bucket with water</button><br>
        <button id="mineDirt" class="collect" onclick="mineDirt()">Dig dirt</button><br>
      </div>

      <div id="inventory">
        <button id="makeT1Crafting" class="craft" onclick="makeT1CraftingTable()">Make crude crafting table</button>
        <p id="inventoryDisplay">You have nothing.</p>
      </div>

      <div id="crafting">
        <div id="craftingT1">
          <p>Crude crafting</p>
          <button class="craft" id="makeKnife" onclick="makeKnife()">Crude knife (10 sticks, 15 stones)</button><br>
          <button class="craft" id="makeThatch" onclick="makeThatch()">Thatch (1 stick -> 1 thatch, requires knife)</button><br>
          <button class="craft" id="makeRope" onclick="makeRope()">Crude rope (25 thatch)</button><br>
          <button class="craft" id="makePickaxe" onclick="makePickaxe()">Crude pickaxe (20 sticks, 25 stones)</button><br>
          <button class="craft" id="makeShovel" onclick="makeShovel()">Crude shovel (15 sticks, 10 stones)</button><br>
          <button class="craft" id="makeBucket" onclick="makeBucket()">Crude bucket (50 stones)</button><br>
          <button class="craft" id="makeSpear" onclick="makeSpear()">Crude spear (30 sticks, 15 stones)</button><br>
          <button class="craft" id="makeClay" onclick="makeClay()">Clay (5 dirt + 1 bucket of water)</button><br>
          <button class="craft" id="upgradeBucket" onclick="upgradeBucket()">Better bucket (20 metal, 10 clay)</button><br>
          <button class="craft" id="makeT2Crafting" onclick="makeT2CraftingTable()">Better crafting table (30 metal, 15 clay, 5 rope)</button><br>
        </div>
        <div id="craftingT2">
          <p>You’ve reached the temporary end. More content coming soon.</p>
        </div>
      </div>

      <div id="cave">
        <p id="caveStarter">You enter a cave. A pickaxe would help.</p>
        <button id="mineStoneMetal" class="collect" onclick="mineCave()">Mine stone and raw metal</button>
        <button id="rawMetalBtn" class="collect" onclick="collectRawMetal()">Mine raw metal</button>
      </div>

      <div id="hunting">
        <p>Hunting grounds</p>
        <button class="collect" id="huntBtn" onclick="huntMeat()">Hunt for meat</button>
      </div>
    </div>

    <script>// Resources
let stick = 0;
let stone = 0;
let thatch = 0;
let crudeRope = 0;
let meat = 0;
let dirt = 0;
let water = 0;
let clay = 0;
let rawMetal = 0;

// Items with tiers
let items = [
  { name: "craftingTable", tier: 0 },
  { name: "knife", tier: 0 },
  { name: "pickaxe", tier: 0 },
  { name: "bucket", tier: 0 },
  { name: "spear", tier: 0 },
  { name: "shovel", tier: 0 },
  { name: "axe", tier: 0 }
];

// Bucket capacity by tier
const bucketCapacityByTier = { 0: 0, 1: 1, 2: 5, 3: 10, 4: 15, 5: 20 };

// Helpers
function updateItemTier(itemName, newTier) {
  let item = items.find(i => i.name === itemName);
  if (item) {
    item.tier = newTier;
    updateInventoryDisplay();
  }
}

function getTier(itemName) {
  let item = items.find(i => i.name === itemName);
  return item ? item.tier : 0;
}

function show(id) { let el = document.getElementById(id); if (el) el.style.display = "block"; }
function hide(id) { let el = document.getElementById(id); if (el) el.style.display = "none"; }

// Tab switching
window.tabSwitch = function(id) {
  let children = document.querySelectorAll("#gameArea > *");
  children.forEach(child => {
    if (child.id === "tabBar") show(child.id);
    else if (child.id === id) show(child.id);
    else hide(child.id);
  });
};

// Begin game
window.beginGame = function() {
  hide("begin");
  show("gameArea");
  show("tabBar");
  tabSwitch("forest");
  updateInventoryDisplay();
  refreshUnlocks();
};

// Inventory display
function updateInventoryDisplay() {
  const el = document.getElementById("inventoryDisplay");
  if (!el) return;

  const bucketTier = getTier("bucket");
  const bucketCapacity = bucketCapacityByTier[bucketTier];

  el.innerHTML = `
    <h3>Inventory</h3>
    <ul>
      ${stick ? `<li>Sticks: ${stick}</li>` : ""}
      ${stone ? `<li>Stones: ${stone}</li>` : ""}
      ${thatch ? `<li>Thatch: ${thatch}</li>` : ""}
      ${crudeRope ? `<li>Crude Rope: ${crudeRope}</li>` : ""}
      ${meat ? `<li>Meat: ${meat}</li>` : ""}
      ${dirt ? `<li>Dirt: ${dirt}</li>` : ""}
      ${clay ? `<li>Clay: ${clay}</li>` : ""}
      ${rawMetal ? `<li>Raw Metal: ${rawMetal}</li>` : ""}
      ${bucketTier > 0 ? `<li>Bucket: ${water}/${bucketCapacity} water</li>` : ""}
      ${items.filter(i => i.tier > 0).map(i => `<li>${i.name} (Tier ${i.tier})</li>`).join("")}
    </ul>
  `;

  if (getTier("craftingTable") === 0 && stick >= 10 && stone >= 5) show("makeT1Crafting");
  else hide("makeT1Crafting");

  refreshContextButtons();
  refreshUnlocks();
}

function refreshContextButtons() {
  if (getTier("bucket") > 0) show("fillBucket"); else hide("fillBucket");
  if (getTier("shovel") > 0) show("mineDirt"); else hide("mineDirt");
  if (getTier("pickaxe") > 0) { show("mineStoneMetal"); show("rawMetalBtn"); }
  else { hide("mineStoneMetal"); hide("rawMetalBtn"); }
  if (getTier("spear") > 0) show("huntBtn"); else hide("huntBtn");
}

function refreshUnlocks() {
  if (window.__caveDiscovered) show("caveTab"); else hide("caveTab");
  if (getTier("spear") > 0) show("huntingTab"); else hide("huntingTab");
}

// Forest collection
window.collectStick = function() {
  let tier = getTier("axe");
  stick += tier === 0 ? 1 : tier ** 10;
  updateInventoryDisplay();
};

window.collectStone = function() {
  let tier = getTier("pickaxe");
  stone += tier === 0 ? 1 : tier ** 10;
  updateInventoryDisplay();
};

// Explore
window.fillBucket = function() {
  let capacity = bucketCapacityByTier[getTier("bucket")];
  if (capacity > 0) { water = capacity; updateInventoryDisplay(); }
};

window.mineDirt = function() {
  if (getTier("shovel") > 0) { 
    dirt += getTier("shovel") * 3;
     updateInventoryDisplay(); 
     }
};

window.discoverCave = function() {
  window.__caveDiscovered = true;
  refreshUnlocks();
  hide("search");
};

// Cave
window.mineCave = function() {
  if (getTier("pickaxe") > 0) { stone += 3; rawMetal += 1; updateInventoryDisplay(); }
};

window.collectRawMetal = function() {
  if (getTier("pickaxe") > 0) { rawMetal++; updateInventoryDisplay(); }
};

// Hunting
window.huntMeat = function() {
  if (getTier("spear") > 0) { meat += getTier("spear") * 5; updateInventoryDisplay(); }
};

// Crafting
window.makeT1CraftingTable = function() {
  if (stick >= 10 && stone >= 5 && getTier("craftingTable") === 0) {
    stick -= 10; stone -= 5;
    updateItemTier("craftingTable", 1);
    show("craftingTab");
    hide("makeT1CraftingTable")
  }
};

window.makeKnife = function() {
  if (stick >= 10 && stone >= 15 && getTier("knife") === 0) {
    stick -= 10; stone -= 15;
    updateItemTier("knife", 1);
    hide("makeKnife")
  }
};

window.makeThatch = function() {
  if (getTier("knife") > 0 && stick >= 1) { stick--; thatch++; updateInventoryDisplay(); }
};

window.makeRope = function() {
  if (thatch >= 25) { thatch -= 25; crudeRope++; updateInventoryDisplay(); }
};

window.makePickaxe = function() {
  if (stick >= 20 && stone >= 25 && getTier("pickaxe") === 0) {
    stick -= 20; stone -= 25;
    updateItemTier("pickaxe", 1);
    hide("makePickaxe")
  }
};

window.makeShovel = function() {
  if (stick >= 15 && stone >= 10 && getTier("shovel") === 0) {
    stick -= 15; stone -= 10;
    updateItemTier("shovel", 1);
    hide("makeShovel")
  }
};

window.makeBucket = function() {
  if (stone >= 50 && getTier("bucket") === 0) {
    stone -= 50;
    updateItemTier("bucket", 1);
    hide("makeBucket")
  }
};

window.makeSpear = function() {
  if (stick >= 30 && stone >= 15 && getTier("spear") === 0) {
    stick -= 30; stone -= 15;
    updateItemTier("spear", 1);
    refreshUnlocks();
    hide("makeSpear")
  }
};

window.makeClay = function() {
  if (dirt >= 5 && water > 0) { dirt -= 5; water--; clay++; updateInventoryDisplay(); }
};

window.upgradeBucket = function() {
  if (rawMetal >= 20 && clay >= 10) {
    rawMetal -= 20; clay -= 10;
    updateItemTier("bucket", 2);
    updateInventoryDisplay();
    hide("upgradeBucket")
  }
};

window.makeT2CraftingTable = function() {
  if (rawMetal >= 30 && clay >= 15 && crudeRope >= 5 && getTier("craftingTable") < 2) {
    rawMetal -= 30; clay -= 15; crudeRope -= 5;
    updateItemTier("craftingTable", 2);
    show("craftingT2");
    tabSwitch("crafting");
    hide("makeT2Crafting")
  }
};

window.__caveDiscovered = false;</script>
  </body>
</html>
